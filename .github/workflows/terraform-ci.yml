name: Terraform CI

on:
  pull_request:
    paths:
      - ".github/workflows/terraform-cd.yml"
      - ".github/workflows/terraform-ci.yml"
      - ".pre-commit-config.yaml"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tfvars.hcl"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.14.6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit==4.4.0

      - name: Run pre-commit hooks
        run: SKIP=terraform_docs pre-commit run --all-files --show-diff-on-failure

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init and validate
        run: |
          set -euo pipefail
          roots=(
            "live/development"
            "live/development/bootstrap"
            "live/management"
            "live/management/bootstrap"
            "modules/alb"
            "modules/bootstrap"
            "modules/database"
            "modules/docker-swarm"
            "modules/ec2"
            "modules/iam-github-oidc"
            "modules/vpc"
          )
          for root in "${roots[@]}"; do
            echo "Validating ${root}"
            terraform -chdir="${root}" init -backend=false -input=false
            terraform -chdir="${root}" validate
          done
